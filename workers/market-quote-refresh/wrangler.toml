name = "bitcoin-market-quote-refresh"
main = "src/index.ts"
compatibility_date = "2026-07-10"

[[d1_databases]]
binding = "MARKET_QUOTES_DB"
database_name = "bitcoin-market-quotes-production"
database_id = "REPLACE_WITH_PRODUCTION_D1_DATABASE_ID"
migrations_dir = "../../migrations"

[env.production]
name = "bitcoin-market-quote-refresh-production"

[env.production.triggers]
crons = ["15 23 * * *"]

[[env.production.d1_databases]]
binding = "MARKET_QUOTES_DB"
database_name = "bitcoin-market-quotes-production"
database_id = "REPLACE_WITH_PRODUCTION_D1_DATABASE_ID"
migrations_dir = "../../migrations"

[env.preview]
name = "bitcoin-market-quote-refresh-preview"

[[env.preview.d1_databases]]
binding = "MARKET_QUOTES_DB"
database_name = "bitcoin-market-quotes-preview"
database_id = "REPLACE_WITH_PREVIEW_D1_DATABASE_ID"
migrations_dir = "../../migrations"
