name: Update Data And Backtest

on:
  schedule:
    - cron: '17 8 * * *'
  workflow_dispatch:

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run reports:refresh
        env:
          FRED_API_KEY: ${{ secrets.FRED_API_KEY }}
      - run: npm run build
