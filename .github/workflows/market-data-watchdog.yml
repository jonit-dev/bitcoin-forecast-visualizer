name: Market data watchdog
on:
  workflow_dispatch:
  schedule:
    - cron: '45 23 * * *'
jobs:
  freshness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: node scripts/check-production-market-data.mjs
        env:
          MARKET_DATA_BASE_URL: ${{ vars.MARKET_DATA_BASE_URL || 'https://bitcoin-forecast-visualizer.pages.dev' }}
